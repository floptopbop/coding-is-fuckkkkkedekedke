    <div class="panel-content">
        <div class="ctrl-row"><label>CHAOS (γ)</label><input type="range" id="sim-chaos-slider" min="0.2" max="5.0" step="0.01" value="2.0"></div>
        <div class="ctrl-row"><label>SPEED (Δt)</label><input type="range" id="time-step-slider" min="0.005" max="0.08" step="0.002" value="0.02"></div>

<script>
    (function() {
        const canvas = document.getElementById('chaos-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let t_global = 0;
        let touchX = 0, touchY = 0, touchActive = false;
        let selectedParticle = null;
        let followMode = false;
        
        // Collapse toggle functions
        function toggleLedger() {
            document.getElementById('ledger-hud').classList.toggle('collapsed');
            const btn = document.getElementById('ledger-collapse-btn');
            btn.innerText = document.getElementById('ledger-hud').classList.contains('collapsed') ? '+' : '−';
        }
        
        function togglePanel() {
            document.getElementById('interactive-panel').classList.toggle('collapsed');
            const btn = document.getElementById('panel-collapse-btn');
            btn.innerText = document.getElementById('interactive-panel').classList.contains('collapsed') ? '+' : '−';
        }
        
        // Make toggle functions globally accessible
        window.toggleLedger = toggleLedger;
        window.togglePanel = togglePanel;
        
        // ========== MANIFEST (50+ parameters) ==========
        const manifest = {
            // Chaos dynamics
            SIM_CHAOS: 2.0,
            THETA_FREQ_A: 1.2,
            THETA_FREQ_B: 0.8,
            THETA_TAN_AMP: 0.5,
            Ux_SCALAR: 3.0,
            Uy_SCALAR: 3.2,
            
            // Trail rendering
            TRAIL_LENGTH: 25,
            TRAIL_WIDTH: 1.1,
            TRAIL_OPACITY: 0.5,
            
            // Particle
            PARTICLE_COUNT: 8,
            
            // Attraction
            TOUCH_FLUX: 6.5,
            
            // Timing
            TIME_STEP: 0.02,
            
            // Visual - void background
            VOID_DECAY: 0.15,
            VOID_R: 2,
            VOID_G: 2,
            VOID_B: 3,
            
            // Visual - trail color
            PATH_R: 138,
            PATH_G: 154,
            PATH_B: 138,
            
            // Visual - head color
            HEAD_R: 200,
            HEAD_G: 80,
            HEAD_B: 80,
            
            // Dynamics
            JITTER_MICRON: 0.4,
            TORUS_WRAP_EN: 1.0,
            WRAP_DISTANCE: 50,
            
            // Color flipping
            COLOR_FLIP_FREQ: 0.5,
            
            // Internal
            LOGIC_BIAS: 0.5
        };
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function createParticles() {
            particles = [];
            for(let i = 0; i < manifest.PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    c: Math.random() * 0.5 + 0.3,
                    seed: Math.random() * 10,
                    history: []
                });
            }
        }
        
        function hardReset() {
            t_global = 0;
            touchActive = false;
            selectedParticle = null;
            createParticles();
            updateSelectedLabel();
        }
        
        function updateSelectedLabel() {
            if(selectedParticle) {
                const idx = particles.indexOf(selectedParticle);
                document.getElementById('selected-label').innerText = `selected: entity_${idx}`;
            } else {
                document.getElementById('selected-label').innerText = 'selected: —';
            }
        }
        
        function buildManifestTable() {
            const tbody = document.getElementById('manifest-tbody');
            tbody.innerHTML = '';
            for(const key in manifest) {
                const tr = document.createElement('tr');
                const val = manifest[key];
                const typeStr = typeof val === 'boolean' ? 'bool' : typeof val === 'number' ? 'num' : 'str';
                
                const tdKey = document.createElement('td');
                tdKey.innerText = key;
                const tdVal = document.createElement('td');
                const inp = document.createElement('input');
                inp.id = `inp-${key}`;
                inp.value = val;
                inp.addEventListener('change', (e) => {
                    if(typeStr === 'num') {
                        manifest[key] = parseFloat(e.target.value);
                    } else if(typeStr === 'bool') {
                        manifest[key] = e.target.value === 'true';
                    } else {
                        manifest[key] = e.target.value;
                    }
                });
                tdVal.appendChild(inp);
                
                const tdType = document.createElement('td');
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.innerText = typeStr;
                tdType.appendChild(badge);
                
                tr.appendChild(tdKey);
                tr.appendChild(tdVal);
                tr.appendChild(tdType);
                tbody.appendChild(tr);
            }
        }
        
        function updateUIFromManifest() {
            document.getElementById('p-count').innerText = particles.length;
        }
        
        // ---------- INTERACTION ----------
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            touchX = touch.clientX;
            touchY = touch.clientY;
            touchActive = true;
            e.preventDefault();
        });
        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            touchX = touch.clientX;
            touchY = touch.clientY;
            e.preventDefault();
        });
        canvas.addEventListener('touchend', (e) => {
            touchActive = false;
            e.preventDefault();
        });
        
        canvas.addEventListener('mousedown', (e) => {
            touchX = e.clientX;
            touchY = e.clientY;
            touchActive = true;
        });
        canvas.addEventListener('mousemove', (e) => {
            touchX = e.clientX;
            touchY = e.clientY;
        });
        canvas.addEventListener('mouseup', (e) => {
            touchActive = false;
        });
        
        canvas.addEventListener('click', (e) => {
            const clickX = e.clientX;
            const clickY = e.clientY;
            let closest = null;
            let closestDist = 15;
            for(let p of particles) {
                const dx = p.x - clickX;
                const dy = p.y - clickY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < closestDist) {
                    closest = p;
                    closestDist = dist;
                }
            }
            if(closest) {
                selectedParticle = closest;
                updateSelectedLabel();
            }
        });
        
        // ---------- SLIDER CONTROLS ----------
        document.getElementById('sim-chaos-slider').addEventListener('input', (e) => {
            manifest.SIM_CHAOS = parseFloat(e.target.value);
            updateUIFromManifest();
            const inpField = document.getElementById('inp-SIM_CHAOS');
            if(inpField) inpField.value = manifest.SIM_CHAOS;
        });
        document.getElementById('time-step-slider').addEventListener('input', (e) => {
            manifest.TIME_STEP = parseFloat(e.target.value);
            updateUIFromManifest();
            const inpField = document.getElementById('inp-TIME_STEP');
            if(inpField) inpField.value = manifest.TIME_STEP;
        });
        document.getElementById('trail-length-slider').addEventListener('input', (e) => {
            manifest.TRAIL_LENGTH = parseFloat(e.target.value);
            updateUIFromManifest();
            const inpField = document.getElementById('inp-TRAIL_LENGTH');
            if(inpField) inpField.value = manifest.TRAIL_LENGTH;
        });
        document.getElementById('touch-flux-slider').addEventListener('input', (e) => {
            manifest.TOUCH_FLUX = parseFloat(e.target.value);
            updateUIFromManifest();
            const inpField = document.getElementById('inp-TOUCH_FLUX');
            if(inpField) inpField.value = manifest.TOUCH_FLUX;
        });
        const followCheck = document.getElementById('follow-toggle');
        followCheck.addEventListener('change', (e) => {
            followMode = e.target.checked;
            document.getElementById('follow-status').innerText = followMode ? "ON" : "OFF";
            if(!followMode) {
                // just disable follow
            } else if(!selectedParticle && particles.length) {
                selectedParticle = particles[0];
                updateSelectedLabel();
            }
        });
        document.getElementById('reset-field-btn').addEventListener('click', () => {
            hardReset();
        });

        // ---------- MAIN LOOP (chaos + attraction + rendering) ----------
        function updateMotionAndDraw() {
            t_global += manifest.TIME_STEP;

            // --- 1. fading background (VOID) ---
            const alphaVoid = Math.min(0.25, manifest.VOID_DECAY);
            ctx.fillStyle = `rgba(${manifest.VOID_R}, ${manifest.VOID_G}, ${manifest.VOID_B}, ${alphaVoid})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- 2. compute camera offset for follow mode ---
            let camOffsetX = 0, camOffsetY = 0;
            if(followMode && selectedParticle && !isNaN(selectedParticle.x)) {
                camOffsetX = canvas.width/2 - selectedParticle.x;
                camOffsetY = canvas.height/2 - selectedParticle.y;
            }
            ctx.save();
            if(camOffsetX !== 0 || camOffsetY !== 0) {
                ctx.translate(camOffsetX, camOffsetY);
            }

            // world touch point (for attraction, considering camera)
            let worldTouchX = touchX, worldTouchY = touchY;
            if(touchActive) {
                worldTouchX = touchX - camOffsetX;
                worldTouchY = touchY - camOffsetY;
            }

            // iterate over all particles
            for(let p of particles) {
                const lt = t_global + p.seed;
                // θ(t) from manifest: sin + tan modulation
                const theta = Math.sin(lt * manifest.THETA_FREQ_A) + 
                              Math.tan(lt * manifest.THETA_FREQ_B) * manifest.THETA_TAN_AMP;
                
                // base chaotic velocity
                let ux = p.c * Math.cos(theta) * manifest.SIM_CHAOS * manifest.Ux_SCALAR;
                let uy = p.c * Math.sin(theta) * manifest.SIM_CHAOS * manifest.Uy_SCALAR;
                
                // --- ATTRACTION / TOUCH FLUX (interactive field) ---
                if(touchActive && manifest.TOUCH_FLUX > 0.01) {
                    const dxTo = worldTouchX - p.x;
                    const dyTo = worldTouchY - p.y;
                    const distSq = dxTo*dxTo + dyTo*dyTo + 0.5;
                    const dist = Math.sqrt(distSq);
                    const forceMag = manifest.TOUCH_FLUX / (dist + 2.0);
                    const clampedForce = Math.min(forceMag, 2.2);
                    ux += dxTo * clampedForce;
                    uy += dyTo * clampedForce;
                }
                
                // jitter (micron noise)
                p.x += ux + (Math.random() - 0.5) * manifest.JITTER_MICRON;
                p.y += uy + (Math.random() - 0.5) * manifest.JITTER_MICRON;
                
                // Toroidal wrap (infinite canvas)
                if(manifest.TORUS_WRAP_EN > 0.5) {
                    const w = canvas.width, h = canvas.height;
                    if(p.x < 0) p.x = w;
                    if(p.x > w) p.x = 0;
                    if(p.y < 0) p.y = h;
                    if(p.y > h) p.y = 0;
                }
                
                // Manage trail history
                p.history.push({x: p.x, y: p.y});
                const maxTrail = Math.min(150, Math.floor(manifest.TRAIL_LENGTH));
                while(p.history.length > maxTrail) p.history.shift();
                
                // draw path trail (only smooth connections)
                ctx.beginPath();
                const trailAlpha = Math.min(0.65, manifest.TRAIL_OPACITY + manifest.LOGIC_BIAS * 0.2);
                ctx.strokeStyle = `rgba(${manifest.PATH_R}, ${manifest.PATH_G}, ${manifest.PATH_B}, ${trailAlpha})`;
                ctx.lineWidth = manifest.TRAIL_WIDTH;
                for(let i=1; i<p.history.length; i++) {
                    const a = p.history[i-1];
                    const b = p.history[i];
                    const jumpX = Math.abs(a.x - b.x);
                    const jumpY = Math.abs(a.y - b.y);
                    if(jumpX < manifest.WRAP_DISTANCE && jumpY < manifest.WRAP_DISTANCE) {
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                    }
                }
                ctx.stroke();
            }
            
            // second pass: draw particle heads (so trails are underneath)
            for(let p of particles) {
                const isRedPhase = (t_global % 1) > manifest.COLOR_FLIP_FREQ;
                let headColor;
                if(p === selectedParticle) {
                    headColor = `rgb(255, 100, 100)`;
                } else {
                    headColor = isRedPhase ? 
                        `rgb(${manifest.HEAD_R}, ${manifest.HEAD_G}, ${manifest.HEAD_B})` : 
                        `rgb(${manifest.PATH_R}, ${manifest.PATH_G}, ${manifest.PATH_B})`;
                }
                ctx.fillStyle = headColor;
                ctx.fillRect(p.x - 1.2, p.y - 1.2, 2.4, 2.4);
                
                // extra glow for selected entity
                if(p === selectedParticle) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 7, 0, Math.PI*2);
                    ctx.strokeStyle = `rgba(209,77,77,0.7)`;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,200,200,0.3)`;
                    ctx.fill();
                }
            }
            
            ctx.restore();  // restore transform
            
            // update HUD values
            document.getElementById('dt-val').innerText = manifest.TIME_STEP.toFixed(4);
            document.getElementById('c-sum').innerText = (t_global * manifest.SIM_CHAOS).toFixed(2);
            document.getElementById('attract-status').innerHTML = (touchActive && manifest.TOUCH_FLUX > 0.2) ? "ATTRACT" : "IDLE";
            document.getElementById('follow-status').innerText = followMode ? "ON" : "OFF";
            requestAnimationFrame(updateMotionAndDraw);
        }
        
        // start everything
        function init() {
            buildManifestTable();
            createParticles();
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            // initial UI sync
            updateUIFromManifest();
            // start animation
            updateMotionAndDraw();
        }
        
        init();
    })();
</script>
