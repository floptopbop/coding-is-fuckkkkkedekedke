#plot-wrap { flex: 1 1 0; min-height: 0; position: relative; }
#plot { width: 100%; height: 100%; }

/* ── Readout overlay ── */
#hud {
  position: absolute; top: 8px; left: 10px;
  font-size: 0.72em; letter-spacing: 0.06em; line-height: 1.75;
  pointer-events: none;
  text-shadow: 0 1px 4px #000, 0 0 8px #000;
}
#hud .row { display: flex; gap: 12px; }
.tx { color: var(--c1); }
.ty { color: var(--c2); }
.tz { color: var(--c3); }
.ta { color: #888; }
.s1c { color: var(--c1); }
.s2c { color: var(--c2); }
.s3c { color: var(--c3); }

/* ── Panel ── */
#panel {
  flex: 0 0 auto;
  background: var(--panel);
  border-top: 1px solid #141414;
  padding: 6px 8px 10px;
  display: flex; flex-direction: column; gap: 4px;
}

.action-row {
  display: flex; gap: 4px;
  padding-bottom: 4px; border-bottom: 1px solid #111;
}
.btn {
  background: #0e0e0e; border: 1px solid #1a1a1a; color: #3a3a3a;
  font-family: 'Courier New', monospace; font-size: 0.65em;
  padding: 4px 9px; border-radius: 3px; cursor: pointer;
  transition: all 0.12s; white-space: nowrap;
}
.btn:active { transform: scale(0.92); }
.btn.on  { color: var(--gold); border-color: #2a2000; background: #0f0c00; }
.btn.del { color: #aa2222; border-color: #1c0000; }
.btn.del:active { background: #160000; }
.btn.ax  { font-size: 0.6em; padding: 3px 8px; letter-spacing: 0.08em; }
.btn.ax.on { color: #ff6666; border-color: #3a0000; background: #110000; }
.btn.cam { font-size: 0.6em; padding: 3px 7px; }
.sp { flex: 1; }

/* ── Segments ── */
.seg {
  display: grid;
  grid-template-columns: 26px 1fr 1fr 1fr;
  align-items: center; gap: 5px; padding: 2px 0;
}
.seg + .seg { border-top: 1px solid #0d0d0d; }

.lk {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid #1a1a1a;
  border-radius: 4px; cursor: pointer; font-size: 0.7em;
  transition: all 0.15s; padding: 0; color: #2a2a2a; flex-shrink: 0;
}
.lk.on { border-color: var(--gold); background: #0f0c00; color: var(--gold); }
#lk1 { border-color: #141c38; }
#lk2 { border-color: #2a0f0f; }
#lk3 { border-color: #0a1e10; }

.sw {
  border-radius: 3px; border: 1px solid transparent;
  transition: border-color 0.1s, background 0.1s; position: relative;
}
.sw.sel { border-color: var(--gold); background: #100d00; }
.sw.sel::after {
  content: ''; position: absolute; inset: 0; border-radius: 3px;
  box-shadow: 0 0 6px 1px #ffcc0028; pointer-events: none;
}
.seg.locked .sw { opacity: 0.18; pointer-events: none; }

input[type=range] {
  -webkit-appearance: none; appearance: none;
  display: block; width: 100%; height: 26px;
  background: transparent; cursor: pointer;
}
input[type=range]::-webkit-slider-runnable-track { height: 2px; border-radius: 1px; background: #1c1c1c; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  height: 15px; width: 15px; border-radius: 50%;
  margin-top: -6.5px; border: 2px solid currentColor; background: #050505;
}
input[type=range]::-moz-range-track { height: 2px; background: #1c1c1c; }
input[type=range]::-moz-range-thumb { height: 13px; width: 13px; border-radius: 50%; border: 2px solid currentColor; background: #050505; }
.c1 input[type=range] { color: var(--c1); }
.c2 input[type=range] { color: var(--c2); }
.c3 input[type=range] { color: var(--c3); }
.sw.sel input[type=range] { color: var(--gold); }

<script>
  let traces={x1:[],y1:[],z1:[],x2:[],y2:[],z2:[],x3:[],y3:[],z3:[]};
  const locks={1:false,2:false,3:false};
  const lpos={1:null,2:null,3:null};
  const sel=new Set();
  let fadeMode=true;

  // Ghost: null = off, object = pinned pose snapshot
  let ghostSnap=null;

  // ── Axis flips ────────────────────────────────────
  const flip={x:1,y:1,z:1};
  function flipAxis(ax){
    flip[ax]*=-1;
    document.getElementById('bF'+ax.toUpperCase()).classList.toggle('on',flip[ax]<0);
    update();
  }

  // ── Camera presets ────────────────────────────────
  const cams={
    iso:  {eye:{x:1.5,y:1.5,z:1.2}},
    top:  {eye:{x:0,  y:0,  z:2.5}},
    front:{eye:{x:0,  y:2.5,z:0  }},
    side: {eye:{x:2.5,y:0,  z:0  }},
  };
  let currentCam=cams.iso;
  function setCamera(name){ currentCam=cams[name]; update(); }

  // ── Helpers ───────────────────────────────────────
  const gV=id=>parseFloat(document.getElementById(id).value);
  const tR=d=>d*Math.PI/180;
  const fmt=v=>(v>=0?' ':'')+v.toFixed(1);
  const ap=({x,y,z})=>({x:x*flip.x,y:y*flip.y,z:z*flip.z});

  function computeChain(){
    const a1=tR(gV('a1')),p1=tR(gV('p1')),l1=gV('l1');
    const a2=tR(gV('a2')),p2=tR(gV('p2')),l2=gV('l2');
    const a3=tR(gV('a3')),p3=tR(gV('p3')),l3=gV('l3');

    let x1=l1*Math.sin(p1)*Math.cos(a1),y1=l1*Math.sin(p1)*Math.sin(a1),z1=-l1*Math.cos(p1);
    if(locks[1]){if(!lpos[1])lpos[1]={x:x1,y:y1,z:z1};({x:x1,y:y1,z:z1}=lpos[1]);}else lpos[1]=null;

    let x2=x1+l2*Math.sin(p2)*Math.cos(a2+a1),y2=y1+l2*Math.sin(p2)*Math.sin(a2+a1),z2=z1-l2*Math.cos(p2);
    if(locks[2]){if(!lpos[2])lpos[2]={x:x2,y:y2,z:z2};({x:x2,y:y2,z:z2}=lpos[2]);}else lpos[2]=null;

    let x3=x2+l3*Math.sin(p3)*Math.cos(a3+a2+a1),y3=y2+l3*Math.sin(p3)*Math.sin(a3+a2+a1),z3=z2-l3*Math.cos(p3);
    if(locks[3]){if(!lpos[3])lpos[3]={x:x3,y:y3,z:z3};({x:x3,y:y3,z:z3}=lpos[3]);}else lpos[3]=null;

    return{x1,y1,z1,x2,y2,z2,x3,y3,z3};
  }

  // Ghost: pin on press, hold frozen while arm moves, clear on press again
  function toggleGhost(){
    if(ghostSnap){
      // already pinned — clear it
      ghostSnap=null;
      document.getElementById('bGhost').classList.remove('on');
    } else {
      // pin current pose now
      ghostSnap=computeChain();
      document.getElementById('bGhost').classList.add('on');
    }
    update();
  }

  function toggleFade(){
    fadeMode=!fadeMode;
    document.getElementById('bFade').classList.toggle('on',fadeMode);
    update();
  }

  function toggleLock(n){
    locks[n]=!locks[n]; if(!locks[n]) lpos[n]=null;
    const b=document.getElementById('lk'+n), s=document.getElementById('sg'+n);
    b.classList.toggle('on',locks[n]);
    s.classList.toggle('locked',locks[n]);
    b.textContent=locks[n]?'\uD83D\uDD13':'\uD83D\uDD12';
    update();
  }

  function trailData(){
    const ks=[['x1','y1','z1','#3366ff'],['x2','y2','z2','#ff3333'],['x3','y3','z3','#00cc44']];
    const out=[];
    if(!fadeMode){
      ks.forEach(([a,b,c,col])=>out.push({
        x:traces[a].map(v=>v*flip.x),y:traces[b].map(v=>v*flip.y),z:traces[c].map(v=>v*flip.z),
        type:'scatter3d',mode:'lines',line:{color:col,width:1,opacity:0.12}
      }));
      return out;
    }
    const N=7;
    ks.forEach(([a,b,c,col])=>{
      const n=traces[a].length; if(n<2) return;
      const cs=Math.max(2,Math.ceil(n/N));
      for(let i=0;i<N;i++){
        const s=i*cs,e=Math.min(n,(i+1)*cs+1); if(s>=n) break;
        out.push({
          x:traces[a].slice(s,e).map(v=>v*flip.x),
          y:traces[b].slice(s,e).map(v=>v*flip.y),
          z:traces[c].slice(s,e).map(v=>v*flip.z),
          type:'scatter3d',mode:'lines',
          line:{color:col,width:1.2,opacity:0.05+(i/N)*0.22}
        });
      }
    });
    return out;
  }

  function update(){
    const c=computeChain();
    const{x1,y1,z1,x2,y2,z2,x3,y3,z3}=c;
    const p0=ap({x:0,y:0,z:0}),p1=ap({x:x1,y:y1,z:z1}),p2=ap({x:x2,y:y2,z:z2}),p3=ap({x:x3,y:y3,z:z3});

    // ── HUD update ────────────────────────────────
    document.getElementById('hx').textContent='x '+fmt(p3.x);
    document.getElementById('hy').textContent='y '+fmt(p3.y);
    document.getElementById('hz').textContent='z '+fmt(p3.z);
    // Rot / Lean per segment (integer degrees)
    const r=Math.round;
    document.getElementById('ha1').textContent='\u2460 '+r(gV('a1'))+'\u00b0 '+r(gV('p1'))+'\u00b0';
    document.getElementById('ha2').textContent='\u2461 '+r(gV('a2'))+'\u00b0 '+r(gV('p2'))+'\u00b0';
    document.getElementById('ha3').textContent='\u2462 '+r(gV('a3'))+'\u00b0 '+r(gV('p3'))+'\u00b0';

    // ── Trail ─────────────────────────────────────
    traces.x1.push(x1);traces.y1.push(y1);traces.z1.push(z1);
    traces.x2.push(x2);traces.y2.push(y2);traces.z2.push(z2);
    traces.x3.push(x3);traces.y3.push(y3);traces.z3.push(z3);
    const M=300;
    ['x1','y1','z1','x2','y2','z2','x3','y3','z3'].forEach(k=>{if(traces[k].length>M)traces[k]=traces[k].slice(-M);});

    // ── Arm ───────────────────────────────────────
    const arm=[
      {x:[p0.x,p1.x],y:[p0.y,p1.y],z:[p0.z,p1.z],type:'scatter3d',mode:'lines+markers',marker:{size:5,color:'#3366ff'},line:{color:'#3366ff',width:7}},
      {x:[p1.x,p2.x],y:[p1.y,p2.y],z:[p1.z,p2.z],type:'scatter3d',mode:'lines+markers',marker:{size:5,color:'#ff3333'},line:{color:'#ff3333',width:5}},
      {x:[p2.x,p3.x],y:[p2.y,p3.y],z:[p2.z,p3.z],type:'scatter3d',mode:'lines+markers',marker:{size:5,color:'#00cc44'},line:{color:'#00cc44',width:4}},
    ];
    const tip=[{x:[p3.x],y:[p3.y],z:[p3.z],type:'scatter3d',mode:'markers',marker:{size:7,color:'#fff',opacity:0.9}}];
    const origin=[{x:[0],y:[0],z:[0],type:'scatter3d',mode:'markers',marker:{size:4,color:'#2a2a2a'}}];

    // ── Ghost: frozen snapshot ────────────────────
    const ghost=[];
    if(ghostSnap){
      const g=ghostSnap;
      const gp0=ap({x:0,y:0,z:0});
      const gp1=ap({x:g.x1,y:g.y1,z:g.z1});
      const gp2=ap({x:g.x2,y:g.y2,z:g.z2});
      const gp3=ap({x:g.x3,y:g.y3,z:g.z3});
      [[gp0,gp1,'#3366ff'],[gp1,gp2,'#ff3333'],[gp2,gp3,'#00cc44']].forEach(([a,b,col])=>
        ghost.push({
          x:[a.x,b.x],y:[a.y,b.y],z:[a.z,b.z],
          type:'scatter3d',mode:'lines+markers',
          marker:{size:4,color:col,opacity:0.35},
          line:{color:col,width:3,dash:'dot'},
          opacity:0.35
        })
      );
      // ghost tip
      ghost.push({x:[gp3.x],y:[gp3.y],z:[gp3.z],type:'scatter3d',mode:'markers',marker:{size:6,color:'#fff',opacity:0.3}});
    }

    // ── Lock markers ─────────────────────────────
    const lmk=[];
    [1,2,3].forEach(n=>{
      const p=lpos[n];
      if(locks[n]&&p){const fp=ap(p);lmk.push({x:[fp.x],y:[fp.y],z:[fp.z],type:'scatter3d',mode:'markers',marker:{size:6,color:'#ffcc00',symbol:'diamond'}});}
    });

    Plotly.react('plot',[...trailData(),...ghost,...origin,...arm,...tip,...lmk],{
      paper_bgcolor:'#050505',plot_bgcolor:'#050505',
      scene:{
        camera:currentCam,
        xaxis:{range:[-40,40],showgrid:false,zeroline:false,showticklabels:false,showspikes:false},
        yaxis:{range:[-40,40],showgrid:false,zeroline:false,showticklabels:false,showspikes:false},
        zaxis:{range:[-40,40],showgrid:false,zeroline:false,showticklabels:false,showspikes:false},
        bgcolor:'#050505'
      },
      showlegend:false,margin:{l:0,r:0,b:0,t:0},
      modebar:{orientation:'v',bgcolor:'transparent',color:'#1a1a1a',activecolor:'#ffcc00'}
    });
    // NOTE: ghostSnap is NOT updated here — it stays frozen until user clears it
  }

  // ── Slider gang linking ───────────────────────────
  let tapping=false, tapT=null, dv0=null, dv0Range=null;

  function updateDesel(){ document.getElementById('bDesel').style.display=sel.size>0?'inline-block':'none'; }
  function toggleSel(id){ const w=document.querySelector(`.sw[data-id="${id}"]`); if(sel.has(id)){sel.delete(id);w.classList.remove('sel');}else{sel.add(id);w.classList.add('sel');} updateDesel(); }
  function clearSel(){ sel.forEach(id=>document.querySelector(`.sw[data-id="${id}"]`)?.classList.remove('sel')); sel.clear(); updateDesel(); }
  function clearTraces(){ traces={x1:[],y1:[],z1:[],x2:[],y2:[],z2:[],x3:[],y3:[],z3:[]}; update(); }

  document.querySelectorAll('.sw').forEach(wrap=>{
    const sid=wrap.dataset.id, inp=wrap.querySelector('input');

    wrap.addEventListener('pointerdown',()=>{ tapping=true; tapT=setTimeout(()=>tapping=false,220); });
    wrap.addEventListener('click',()=>{ if(tapping){ toggleSel(sid); tapping=false; clearTimeout(tapT); } });

    inp.addEventListener('pointerdown',()=>{
      dv0=parseFloat(inp.value);
      dv0Range=parseFloat(inp.max)-parseFloat(inp.min);
    });

    inp.addEventListener('input',()=>{
      const cur=parseFloat(inp.value);
      if(sel.has(sid)&&sel.size>1&&dv0!==null){
        const frac=(cur-dv0)/dv0Range;
        dv0=cur;
        sel.forEach(oid=>{
          if(oid===sid) return;
          const o=document.getElementById(oid);
          const oRange=parseFloat(o.max)-parseFloat(o.min);
          o.value=Math.max(+o.min,Math.min(+o.max,+o.value+frac*oRange));
        });
      }
      update();
    });
  });

  document.addEventListener('pointerup',()=>{ dv0=null; dv0Range=null; });

  update();
</script>

</body>
