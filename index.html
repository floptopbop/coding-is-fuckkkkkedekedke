<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOBLIN_OS_FINAL_STRIKE</title>
    <style>
        body { background: #1a1a1a; color: #F8EBD1; font-family: monospace; margin: 0; overflow: hidden; touch-action: none; }
        #wrap { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 80px; background: #000; border: 2px solid #F8EBD1; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
        #ui { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #000; border-top: 2px solid #F8EBD1; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .btn { background: #000; color: #F8EBD1; border: 1px solid #F8EBD1; padding: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="wrap"><canvas id="c"></canvas></div>
<div id="ui">
    <label class="btn">INJECT IMAGE<input type="file" id="loader" accept="image/*"></label>
    <button class="btn" id="stir">STIR</button>
    <div style="font-size: 10px;">CLICK/DRAG TO PULL FRAGMENTS</div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let blocks = [], img = null, isDown = false, mouse = { x: 0, y: 0 };

    // --- INPUTS ---
    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = (clientX - rect.left) * (canvas.width / rect.width);
        mouse.y = (clientY - rect.top) * (canvas.height / rect.height);
    };
    canvas.addEventListener('mousedown', (e) => { isDown = true; getPos(e); });
    canvas.addEventListener('mousemove', (e) => { if(isDown) getPos(e); });
    window.addEventListener('mouseup', () => { isDown = false; });
    canvas.addEventListener('touchstart', (e) => { isDown = true; getPos(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { if(isDown) getPos(e); }, {passive: false});
    window.addEventListener('touchend', () => { isDown = false; });

    document.getElementById('loader').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            img = new Image();
            img.onload = () => {
                canvas.width = img.width > 800 ? 800 : img.width;
                canvas.height = (canvas.width / img.width) * img.height;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                blocks = [];
                const res = 12; // Size of fragments
                for (let y = 0; y < canvas.height; y += res) {
                    for (let x = 0; x < canvas.width; x += res) {
                        let i = (y * canvas.width + x) * 4;
                        blocks.push({
                            x, y, vx: 0, vy: 0, 
                            c: `rgb(${data[i]},${data[i+1]},${data[i+2]})`,
                            size: res
                        });
                    }
                }
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('stir').onclick = () => {
        blocks.forEach(b => { b.vx = (Math.random()-0.5)*20; b.vy = (Math.random()-0.5)*20; });
    };

    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        blocks.forEach(b => {
            if (isDown) {
                let dx = mouse.x - b.x, dy = mouse.y - b.y;
                let d = Math.sqrt(dx*dx + dy*dy);
                if (d < 150) {
                    b.vx += dx * 0.01;
                    b.vy += dy * 0.01;
                }
            }
            
            b.vy += 0.2; // Gravity
            b.vx *= 0.98; b.vy *= 0.98; // Friction
            b.x += b.vx; b.y += b.vy;

            if (b.y > canvas.height - b.size) { b.y = canvas.height - b.size; b.vy *= -0.4; }
            if (b.x < 0 || b.x > canvas.width) b.vx *= -1;

            ctx.fillStyle = b.c;
            ctx.fillRect(b.x, b.y, b.size, b.size);
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
